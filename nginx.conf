server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The app mounts under /auth/ on the public lum.id origin — the
    # outer lumid_landing_readdy nginx proxies /auth/ here without rewriting
    # the path, so every asset request already has the prefix.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets; index.html revalidates so pushes are
    # picked up on next navigation.
    location ~* \.(js|css|woff2?|png|svg|jpg)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
